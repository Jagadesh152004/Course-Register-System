<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Course - CourseHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand">🎓 CourseHub</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="available.html" class="nav-link">Courses</a>
            <a href="enrolled.html" class="nav-link">Enrolled</a>
            <a href="register.html" class="nav-link active">Register</a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; margin-top: 40px;">
        
        <div style="width: 100%; max-width: 500px;">
            
            <div class="register-header">
                <h1 class="page-title">Register for a Course</h1>
                <p class="page-subtitle">Fill out your details to secure your spot.</p>
            </div>

            <div class="form-container" style="max-width: 100%;">
                <form action="https://course-register-system.onrender.com//courses/register" method="post">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="e.g. John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="emailID">Email Address</label>
                        <input type="email" id="emailID" name="emailID" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="courseName">Select Course</label>
                        <select name="courseName" id="courseName" required>
                            <option value="JAVA Core">JAVA Core</option>
                            <option value="Spring Boot">Spring Boot</option>
                            <option value="Java Script">Java Script</option>
                            <option value="React.js Masterclass">React.js Masterclass</option>
                            <option value="Cloud - AWS">Cloud Computing (AWS)</option>
                            <option value="DSA">Data Structures & Algorithms</option>
                            <option value="Full Stack Web Dev">Full Stack Web Dev</option>
                            <option value="Cybersecurity Basics">Cybersecurity</option>
                            <option value="UI/UX Design Principles">UI/UX Design Principles</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Submit Registration</button>
                </form>
            </div>
            
        </div>
    </div>
</body>
</html>
